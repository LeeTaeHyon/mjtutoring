<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>버디업 멘토링 일정 캘린더</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #818cf8;
      --accent: #ef4444;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #94a3b8;
      --border: #e2e8f0;
      --session-bg: #ede9fe;
      --session-border: #4f46e5;
      --notice-bg: #fefce8;
      --notice-border: #eab308;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 16px 12px 40px;
    }

    /* ── 공지사항 ── */
    .notice-area {
      max-width: 720px;
      margin: 0 auto 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .notice-card {
      background: var(--notice-bg);
      border-left: 4px solid var(--notice-border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      box-shadow: 0 1px 6px rgba(234, 179, 8, 0.12);
    }

    .notice-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .notice-body {
      flex: 1;
    }

    .notice-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: #92400e;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .notice-text {
      font-size: 0.92rem;
      color: #78350f;
      line-height: 1.55;
    }

    .notice-date {
      font-size: 0.75rem;
      color: #a16207;
      margin-top: 4px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 3px;
      color: var(--primary);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.83rem;
      margin-bottom: 18px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 13px;
      height: 13px;
      border-radius: 4px;
    }

    .ld-session {
      background: var(--session-bg);
      border: 2px solid var(--session-border);
    }

    .ld-today {
      outline: 2px solid var(--accent);
      background: transparent;
    }

    .calendars {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .month-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 18px;
      width: 340px;
      max-width: 100%;
    }

    .month-title {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-header {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      padding: 3px 0;
    }

    .day-header:first-child {
      color: #ef4444;
    }

    .day-header:last-child {
      color: #3b82f6;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: default;
      position: relative;
      transition: transform 0.12s;
      gap: 2px;
    }

    .day-cell.empty {
      background: transparent;
    }

    .day-cell.normal {
      color: var(--text);
    }

    .day-cell.sunday {
      color: #ef4444;
    }

    .day-cell.saturday {
      color: #3b82f6;
    }

    .day-cell.out-range {
      color: var(--border);
    }

    .day-cell.session {
      background: var(--session-bg);
      border: 2px solid var(--session-border);
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
    }

    .day-cell.session:hover {
      transform: scale(1.12);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.28);
      z-index: 1;
    }

    .day-cell.today {
      outline: 2px solid var(--accent);
    }

    /* 날짜 셀 안 점 표시 (세션 수) */
    .dot-row {
      display: flex;
      gap: 2px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
    }

    /* ── 모달 ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: var(--card);
      border-radius: 20px;
      padding: 22px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      animation: pop 0.15s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes pop {
      from {
        transform: scale(0.9);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .modal-date-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--muted);
    }

    /* 세션이 여러 개일 때 탭 */
    .session-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: transparent;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.12s;
    }

    .tab-btn.active {
      background: var(--session-bg);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 700;
    }

    .session-detail {
      display: none;
    }

    .session-detail.visible {
      display: block;
    }

    .modal-week-badge {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--primary);
      background: var(--session-bg);
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .modal-field {
      margin-bottom: 10px;
    }

    .modal-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .modal-value {
      font-size: 0.92rem;
      color: var(--text);
      background: var(--bg);
      border-radius: 8px;
      padding: 9px 11px;
      line-height: 1.5;
    }

    .modal-value.placeholder {
      color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 380px) {
      .month-card {
        padding: 10px 6px;
      }

      .day-cell {
        font-size: 0.73rem;
      }

      .modal {
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <h1>📚 버디업 멘토링 일정</h1>
  <p class="subtitle">2026년 3월 30일 ~ 5월 18일</p>

  <!-- 공지사항 영역 -->
  <div class="notice-area" id="notice-area"></div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot ld-session"></div> 튜터링 날짜 (클릭 → 상세)
    </div>
    <div class="legend-item">
      <div class="legend-dot ld-today" style="border:2px solid var(--accent);"></div> 오늘
    </div>
  </div>

  <div class="calendars" id="calendars"></div>

  <!-- 모달 -->
  <div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-date-title" id="modal-date"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="session-tabs" id="session-tabs"></div>
      <div id="session-details"></div>
    </div>
  </div>

  <script>
    // ============================================================
    //  ✏️ [1] 공지사항 — 배열에 객체 추가/삭제로 관리
    //       표시 안 하려면 빈 배열 [] 로 두면 됩니다
    // ============================================================
    const NOTICES = [
      {
        title: "공지",
        text: "오리엔테이션 영상 시청, 자기이해활동 필수",
        date: "~6/5까지"   // 작성일 (선택, 비워도 됨)
      }
    ];

    // ============================================================
    //  ✏️ [2] 튜터링 세션 — 같은 날짜에 여러 개 추가 가능
    //
    //  날짜 추가 방법:
    //    아래 배열에 { ... } 객체 하나 추가하면 됩니다.
    //    같은 날짜에 2개 넣으면 모달에 탭으로 구분됩니다.
    //
    //  날짜 형식: "YYYY-MM-DD"
    // ============================================================
    const SESSIONS = [
      {
        date: "2026-03-30",
        time: "11:30 ~ 13:30",
        content: "1주차: 학교 도서관 이용 안내 및 도서관 스터디",
        type: "어울림"
      },
      {
        date: "2026-04-06",
        time: "12:00 ~ 14:00",
        content: "2주차: 생소한 전공 과목 속 요소 강의",
        type: "학습"
      },
      {
        date: "2026-04-13",
        time: "12:00 ~ 14:00",
        content: "3주차: 팀 프로젝트에서 원활한 프로젝트 진행 방법",
        type: "학습"
      },
      {
        date: "2026-04-20",
        time: "12:00 ~ 14:00",
        content: "4주차: 중간 고사를 위한 전공 과목 정리",
        type: "학습"
      },
      {
        date: "2026-05-04",
        time: "12:00 ~ 14:00",
        content: "5주차: 시험 후 환기를 위한 교내 식당 및 카페 등 안내",
        type: "어울림"
      },
      {
        date: "2026-05-11",
        time: "12:00 ~ 14:00",
        content: "6주차: 현재 학습 수준을 파악해 부족한 부분 보완",
        type: "학습"
      },
      {
        date: "2026-05-18",
        time: "12:00 ~ 14:00",
        content: "7주차: 지난 주차를 돌아보며 학습 점검 및 질답",
        type: "학습"
      }
    ];

    // ============================================================
    //  캘린더 표시 범위 (필요시 수정)
    // ============================================================
    const RANGE_START = "2026-03-30";
    const RANGE_END = "2026-05-18";

    // ── 공지사항 렌더링 ──
    const noticeArea = document.getElementById('notice-area');
    NOTICES.forEach(n => {
      if (!n.text) return;
      const card = document.createElement('div');
      card.className = 'notice-card';
      card.innerHTML = `
    <div class="notice-icon">📢</div>
    <div class="notice-body">
      <div class="notice-title">${n.title || '공지사항'}</div>
      <div class="notice-text">${n.text}</div>
      ${n.date ? `<div class="notice-date">${n.date}</div>` : ''}
    </div>`;
      noticeArea.appendChild(card);
    });

    // ── 세션 맵 (날짜 → 배열) ──
    const sessionMap = {};
    SESSIONS.forEach(s => {
      if (!sessionMap[s.date]) sessionMap[s.date] = [];
      sessionMap[s.date].push(s);
    });

    const KR_DAYS = ["일", "월", "화", "수", "목", "금", "토"];
    const KR_DAYS_FULL = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];

    function pad(n) { return String(n).padStart(2, '0'); }
    function dateStr(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }
    function todayStr() { const t = new Date(); return dateStr(t.getFullYear(), t.getMonth() + 1, t.getDate()); }

    function buildMonth(year, month) {
      const card = document.createElement('div');
      card.className = 'month-card';
      const title = document.createElement('div');
      title.className = 'month-title';
      const monthNames = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];
      title.textContent = `${year}년 ${monthNames[month - 1]}`;
      card.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'cal-grid';
      KR_DAYS.forEach(d => {
        const h = document.createElement('div');
        h.className = 'day-header';
        h.textContent = d;
        grid.appendChild(h);
      });

      const firstDay = new Date(year, month - 1, 1).getDay();
      const lastDate = new Date(year, month, 0).getDate();
      const today = todayStr();

      for (let i = 0; i < firstDay; i++) {
        const e = document.createElement('div');
        e.className = 'day-cell empty';
        grid.appendChild(e);
      }

      for (let d = 1; d <= lastDate; d++) {
        const ds = dateStr(year, month, d);
        const dow = new Date(year, month - 1, d).getDay();
        const inRange = ds >= RANGE_START && ds <= RANGE_END;
        const sessions = sessionMap[ds];
        const cell = document.createElement('div');

        let cls = 'day-cell';
        if (sessions) cls += ' session';
        else if (!inRange) cls += ' out-range';
        else if (dow === 0) cls += ' sunday';
        else if (dow === 6) cls += ' saturday';
        else cls += ' normal';
        if (ds === today) cls += ' today';
        cell.className = cls;

        const numSpan = document.createElement('span');
        numSpan.textContent = d;
        cell.appendChild(numSpan);

        if (sessions) {
          const dotRow = document.createElement('div');
          dotRow.className = 'dot-row';
          sessions.forEach(() => {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dotRow.appendChild(dot);
          });
          cell.appendChild(dotRow);
          cell.addEventListener('click', () => openModal(ds));
        }
        grid.appendChild(cell);
      }

      card.appendChild(grid);
      return card;
    }

    function openModal(ds) {
      const sessions = sessionMap[ds];
      const d = new Date(ds + 'T00:00:00');
      const dow = d.getDay();
      document.getElementById('modal-date').textContent =
        `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${KR_DAYS_FULL[dow]})`;

      const tabsEl = document.getElementById('session-tabs');
      const detailsEl = document.getElementById('session-details');
      tabsEl.innerHTML = '';
      detailsEl.innerHTML = '';

      sessions.forEach((s, i) => {
        // 탭 버튼
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.textContent = s.type || `활동 ${i + 1}`;
        btn.addEventListener('click', () => switchTab(i));
        tabsEl.appendChild(btn);

        // 세션 상세
        const detail = document.createElement('div');
        detail.className = 'session-detail' + (i === 0 ? ' visible' : '');
        detail.id = `detail-${i}`;
        detail.innerHTML = `
      <div class="modal-week-badge">${s.type || '활동'}</div>
      ${field('📅 날짜', s.date)}
      ${field('🕐 활동 시간', s.time)}
      ${field('📝 활동 내용', s.content)}
      ${field('🏷️ 활동 구분', s.type)}
    `;
        detailsEl.appendChild(detail);
      });

      // 탭 1개면 탭 버튼 숨김
      if (sessions.length === 1) tabsEl.style.display = 'none';
      else tabsEl.style.display = 'flex';

      document.getElementById('overlay').classList.add('open');
    }

    function field(label, val) {
      const empty = !val || val.trim() === '';
      return `<div class="modal-field">
    <div class="modal-label">${label}</div>
    <div class="modal-value${empty ? ' placeholder' : ''}">${empty ? '(미입력)' : val}</div>
  </div>`;
    }

    function switchTab(idx) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
      document.querySelectorAll('.session-detail').forEach((d, i) => d.classList.toggle('visible', i === idx));
    }

    function closeModal(e) {
      if (!e || e.target === document.getElementById('overlay')) {
        document.getElementById('overlay').classList.remove('open');
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    const container = document.getElementById('calendars');
    container.appendChild(buildMonth(2026, 3));
    container.appendChild(buildMonth(2026, 4));
    container.appendChild(buildMonth(2026, 5));
  </script>
</body>

</html>
